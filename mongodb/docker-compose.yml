services:
  mongodb:
    image: mongo:latest
    container_name: vm2_mongodb
    networks:
      - vm2_network
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - ./mongodb/data:/data/db
    restart: unless-stopped

networks:
  vm2_network:
    external: true